appId: com.beaver.app
productName: Beaver
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
  - resources/png/**/*
asarUnpack:
  - resources/png/**/*
  - "**/*.node"
afterPack: scripts/after-pack-hook.js
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: resources/icon.ico
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
portable:
  artifactName: "${productName}-${version}-portable.${ext}"