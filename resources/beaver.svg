  <ellipse cx="186" cy="116" rx="14" ry="18" fill="#C87E5A"/>
  <ellipse cx="326" cy="116" rx="24" ry="28" fill="#7A5230"/>
  <ellipse cx="326" cy="116" rx="14" ry="18" fill="#C87E5A"/>

