  <circle cx="222" cy="168" r="18" fill="#1A1008"/>
  <circle cx="290" cy="168" r="18" fill="#1A1008"/>
  <circle cx="226" cy="163" r="5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="294" cy="163" r="5" fill="#FFFFFF" opacity="0.9"/>

