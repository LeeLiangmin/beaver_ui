  <line x1="193" y1="402" x2="193" y2="410" stroke="#5C3D1E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="316" y1="400" x2="316" y2="408" stroke="#5C3D1E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="327" y1="403" x2="327" y2="411" stroke="#5C3D1E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="338" y1="400" x2="341" y2="408" stroke="#5C3D1E" stroke-width="2.5" stroke-linecap="round"/>

