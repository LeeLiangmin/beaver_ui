  <line x1="234" y1="289" x2="278" y2="289" stroke="#F5E6C8" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="234" y1="296" x2="270" y2="296" stroke="#F5E6C8" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="234" y1="303" x2="265" y2="303" stroke="#F5E6C8" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <polyline points="234,289 237,292 243,285" fill="none" stroke="#E8B96A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
